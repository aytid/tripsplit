<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripSplit — Trip Expense Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EAE3D2;
    --paper-raised: #F4EFE1;
    --ink: #2A2A22;
    --ink-soft: #6B6A5C;
    --pine: #2F5233;
    --pine-deep: #203a24;
    --amber: #D9A441;
    --amber-deep: #B9862F;
    --brick: #B0402F;
    --line: rgba(42,42,34,0.14);
    --radius: 14px;
    --shadow: 0 2px 10px rgba(42,42,34,0.08), 0 1px 2px rgba(42,42,34,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top left, rgba(217,164,65,0.08), transparent 55%),
      var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding: 28px 16px 80px;
  }
  .app{max-width:980px;margin:0 auto;}
  h1,h2,h3{font-family:'Fraunces',serif;margin:0;}
  .mono{font-family:'JetBrains Mono',monospace;}
  ::selection{background:var(--amber);color:var(--ink);}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  :focus-visible{outline:2.5px solid var(--pine);outline-offset:2px;}

  /* ---------- HERO / BOARDING PASS ---------- */
  .pass{
    background:var(--paper-raised);
    border-radius: var(--radius);
    box-shadow:var(--shadow);
    display:grid;
    grid-template-columns: 1fr 210px;
    position:relative;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .pass::after{
    content:"";
    position:absolute;
    top:0; bottom:0; right:210px;
    width:0;
    border-right: 2px dashed rgba(42,42,34,0.22);
  }
  .pass::before{
    content:"";
    position:absolute;
    right:198px; top:-12px;
    width:24px;height:24px;border-radius:50%;
    background:var(--paper);
    box-shadow: 0 calc(100% - 12px) 0 -12px var(--paper);
  }
  .pass-main{padding:26px 28px 22px;}
  .eyebrow{
    text-transform:uppercase; letter-spacing:.14em; font-size:11px;
    color:var(--pine); font-weight:700; margin-bottom:6px;
  }
  .trip-name-input{
    font-family:'Fraunces',serif; font-size:32px; font-weight:600;
    border:none; background:transparent; color:var(--ink);
    width:100%; padding:2px 0; border-bottom:2px solid transparent;
  }
  .trip-name-input:hover, .trip-name-input:focus{border-bottom:2px solid var(--line);}
  .pass-meta{display:flex; gap:18px; margin-top:12px; flex-wrap:wrap; align-items:center;}
  .meta-field{display:flex; flex-direction:column; gap:3px;}
  .meta-field label{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);}
  .meta-field input, .meta-field select{
    border:1px solid var(--line); background:#fff; border-radius:8px;
    padding:6px 9px; font-size:13.5px; color:var(--ink);
  }
  .pass-stub{
    background:var(--pine); color:#F4EFE1; padding:24px 20px;
    display:flex; flex-direction:column; justify-content:center; gap:14px;
  }
  .stub-item .stub-label{font-size:10px; text-transform:uppercase; letter-spacing:.1em; opacity:.75;}
  .stub-item .stub-value{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; margin-top:2px;}

  /* participants */
  .friends-row{padding:16px 28px 24px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; border-top:1px solid var(--line);}
  .chip{
    display:flex; align-items:center; gap:7px;
    background:#fff; border:1px solid var(--line); border-radius:999px;
    padding:5px 12px 5px 5px; font-size:13.5px; font-weight:500;
  }
  .avatar{
    width:24px;height:24px;border-radius:50%; color:#fff; font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace;
  }
  .chip .remove{background:none;border:none;color:var(--ink-soft);font-size:15px;padding:0 2px;line-height:1;}
  .chip .remove:hover{color:var(--brick);}
  .add-friend{
    display:flex; align-items:center; gap:6px; background:transparent;
    border:1.5px dashed var(--ink-soft); border-radius:999px; padding:6px 14px;
    color:var(--ink-soft); font-size:13.5px; font-weight:600;
  }
  .add-friend:hover{border-color:var(--pine); color:var(--pine);}
  .add-friend-form{display:flex; gap:6px; align-items:center;}
  .add-friend-form input{border:1px solid var(--pine); border-radius:999px; padding:6px 12px; font-size:13.5px; width:140px;}
  .add-friend-form button{background:var(--pine); color:#fff; border:none; border-radius:999px; padding:6px 14px; font-size:13px; font-weight:600;}

  /* ---------- LAYOUT ---------- */
  .grid{display:grid; grid-template-columns: 1.35fr 1fr; gap:20px; margin-top:22px; align-items:start;}
  @media (max-width: 800px){ .grid{grid-template-columns:1fr;} .pass{grid-template-columns:1fr;} .pass::after,.pass::before{display:none;} }

  .card{
    background:var(--paper-raised); border-radius:var(--radius); box-shadow:var(--shadow);
    border:1px solid var(--line); padding:20px 22px;
  }
  .card + .card{margin-top:20px;}
  .card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .card-head h2{font-size:19px; font-weight:600;}
  .btn{
    border:none; border-radius:9px; padding:9px 16px; font-size:13.5px; font-weight:600;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn-primary{background:var(--pine); color:#fff;}
  .btn-primary:hover{background:var(--pine-deep);}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--ink-soft); color:var(--ink);}
  .btn-small{padding:5px 10px; font-size:12px; border-radius:7px;}

  /* ---------- EXPENSE FORM ---------- */
  .form-row{margin-bottom:12px;}
  .form-row label{display:block; font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:5px; font-weight:600;}
  .form-row input[type=text], .form-row input[type=number], .form-row select, .form-row input[type=date]{
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; background:#fff; font-size:14px; color:var(--ink);
  }
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .category-picker{display:flex; gap:7px; flex-wrap:wrap;}
  .cat-btn{
    border:1px solid var(--line); background:#fff; border-radius:8px; padding:7px 11px; font-size:12.5px;
    display:flex; align-items:center; gap:5px; color:var(--ink-soft);
  }
  .cat-btn.active{background:var(--amber); border-color:var(--amber-deep); color:var(--ink); font-weight:600;}
  .split-type-picker{display:flex; gap:6px; margin-bottom:10px;}
  .split-type-picker button{
    flex:1; border:1px solid var(--line); background:#fff; padding:8px; border-radius:8px; font-size:13px; color:var(--ink-soft); font-weight:600;
  }
  .split-type-picker button.active{background:var(--pine); border-color:var(--pine); color:#fff;}
  .split-participants{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
  .split-row{display:flex; align-items:center; gap:10px; padding:7px 9px; border:1px solid var(--line); border-radius:8px; background:#fff;}
  .split-row input[type=checkbox]{width:16px;height:16px; accent-color:var(--pine);}
  .split-row .name{flex:1; font-size:13.5px; font-weight:500;}
  .split-row input.share-input{width:90px; text-align:right; padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:13px;}
  .split-sum-note{font-size:12px; margin-top:8px; color:var(--ink-soft);}
  .split-sum-note.error{color:var(--brick); font-weight:600;}
  .form-actions{display:flex; gap:10px; margin-top:16px;}

  /* ---------- TICKETS (expense list) ---------- */
  .ticket{
    position:relative; background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:14px 16px; margin-bottom:12px; display:flex; gap:14px; align-items:flex-start;
  }
  .ticket-cat{
    width:38px;height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-size:18px; flex-shrink:0; background:var(--paper);
  }
  .ticket-body{flex:1; min-width:0;}
  .ticket-top{display:flex; justify-content:space-between; gap:10px; align-items:baseline;}
  .ticket-desc{font-weight:600; font-size:15px;}
  .ticket-amount{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px; white-space:nowrap;}
  .ticket-meta{font-size:12.5px; color:var(--ink-soft); margin-top:3px;}
  .ticket-split{font-size:12px; color:var(--ink-soft); margin-top:6px; line-height:1.6;}
  .ticket-actions{display:flex; gap:6px; margin-left:6px; flex-shrink:0;}
  .icon-btn{
    background:none; border:none; color:var(--ink-soft); font-size:15px; padding:3px 5px; border-radius:5px;
  }
  .icon-btn:hover{background:var(--paper); color:var(--ink);}
  .empty-state{text-align:center; padding:34px 10px; color:var(--ink-soft);}
  .empty-state .big{font-size:34px; margin-bottom:6px;}

  /* ---------- BALANCES ---------- */
  .balance-row{margin-bottom:14px;}
  .balance-row .b-top{display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:5px;}
  .b-name{font-weight:600; display:flex; align-items:center; gap:7px;}
  .b-amount{font-family:'JetBrains Mono',monospace; font-weight:700;}
  .b-amount.pos{color:var(--pine);}
  .b-amount.neg{color:var(--brick);}
  .bar-track{height:7px; background:var(--paper); border-radius:99px; overflow:hidden;}
  .bar-fill{height:100%; border-radius:99px;}

  /* ---------- SETTLEMENT TICKETS ---------- */
  .settle-ticket{
    background:repeating-linear-gradient(135deg, #fff, #fff 8px, #fdfaf3 8px, #fdfaf3 16px);
    border:1px dashed var(--ink-soft);
    border-radius:10px; padding:12px 14px; margin-bottom:10px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .settle-ticket.settled{opacity:.5;}
  .settle-text{font-size:13.5px;}
  .settle-text b{font-family:'JetBrains Mono',monospace;}
  .settle-arrow{color:var(--amber-deep); font-weight:700; margin:0 4px;}
  .settle-check{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);}
  .settle-check input{width:16px;height:16px;accent-color:var(--pine);}
  .all-settled{text-align:center; padding:20px; color:var(--pine); font-weight:600;}

  /* footer */
  .foot-actions{display:flex; justify-content:center; gap:10px; margin-top:26px; flex-wrap:wrap;}
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:10px 18px; border-radius:9px; font-size:13.5px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
    box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(42,42,34,0.45); display:none; align-items:flex-start; justify-content:center;
    padding:30px 14px; overflow-y:auto; z-index:40;
  }
  .modal-backdrop.show{display:flex;}
  .modal{background:var(--paper-raised); border-radius:var(--radius); padding:22px; max-width:440px; width:100%; box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .modal h3{margin-bottom:14px;}
  .loading{text-align:center; padding:60px 10px; color:var(--ink-soft); font-size:14px;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading" id="loading">Opening the ledger…</div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="confirmBackdrop">
  <div class="modal">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmBody" style="font-size:13.5px; color:var(--ink-soft); margin-bottom:16px;"></p>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-primary" id="confirmYes" style="background:var(--brick);">Delete</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   TRIPSPLIT — trip expense ledger
   Persistence via window.storage (personal, per-user).
   ============================================================ */

const STORAGE_KEY = 'tripsplit:trip:v1';
let state = null;
let saveTimer = null;

const CATEGORIES = [
  {id:'food', label:'Food', icon:'🍜'},
  {id:'transport', label:'Transport', icon:'🚗'},
  {id:'stay', label:'Stay', icon:'🏕️'},
  {id:'activity', label:'Activities', icon:'🎟️'},
  {id:'shopping', label:'Shopping', icon:'🛍️'},
  {id:'other', label:'Other', icon:'📦'},
];

const AVATAR_COLORS = ['#2F5233','#B0402F','#B9862F','#3D5A80','#7A4B8C','#4E6E58','#9C5B2E'];

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function defaultState(){
  return {
    tripName: 'Weekend Getaway',
    date: new Date().toISOString().slice(0,10),
    currency: '₹',
    participants: [],
    expenses: [],
    settledPairs: {}, // key "fromId|toId" -> true
  };
}

function colorFor(id){
  let hash = 0;
  for(const ch of id) hash = (hash*31 + ch.charCodeAt(0)) % 997;
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}

function initials(name){
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1]?parts[1][0]:'')).toUpperCase();
}

function fmt(n){
  const v = Math.round((n + Number.EPSILON) * 100) / 100;
  return state.currency + v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
}

/* ---------------- persistence ---------------- */
async function loadState(){
  try{
    const res = await window.storage.get('trip-data', false);
    state = res ? JSON.parse(res.value) : defaultState();
  }catch(e){
    state = defaultState();
  }
  render();
}

function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 350);
}

async function saveState(){
  try{
    await window.storage.set('trip-data', JSON.stringify(state), false);
  }catch(e){
    showToast('Could not save — check your connection');
  }
}

/* ---------------- toast ---------------- */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------------- confirm modal ---------------- */
function openConfirm(title, body, onYes){
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').textContent = body;
  const yesBtn = document.getElementById('confirmYes');
  const newYes = yesBtn.cloneNode(true);
  yesBtn.parentNode.replaceChild(newYes, yesBtn);
  newYes.addEventListener('click', ()=>{ onYes(); closeConfirm(); });
  document.getElementById('confirmBackdrop').classList.add('show');
}
function closeConfirm(){ document.getElementById('confirmBackdrop').classList.remove('show'); }

/* ---------------- balance computation ---------------- */
function computeBalances(){
  const paid = {}; const owed = {};
  state.participants.forEach(p=>{ paid[p.id]=0; owed[p.id]=0; });
  state.expenses.forEach(exp=>{
    if(paid[exp.paidBy] !== undefined) paid[exp.paidBy] += exp.amount;
    Object.entries(exp.splits).forEach(([pid, amt])=>{
      if(owed[pid] !== undefined) owed[pid] += amt;
    });
  });
  return state.participants.map(p=>({
    id:p.id, name:p.name,
    paid: paid[p.id]||0, owed: owed[p.id]||0,
    net: (paid[p.id]||0) - (owed[p.id]||0)
  }));
}

function simplifyDebts(balances){
  const creditors = balances.filter(b=>b.net>0.005).map(b=>({...b, amt:b.net})).sort((a,b)=>b.amt-a.amt);
  const debtors = balances.filter(b=>b.net<-0.005).map(b=>({...b, amt:-b.net})).sort((a,b)=>b.amt-a.amt);
  const txns = [];
  let i=0,j=0;
  while(i<debtors.length && j<creditors.length){
    const pay = Math.min(debtors[i].amt, creditors[j].amt);
    txns.push({from:debtors[i].id, fromName:debtors[i].name, to:creditors[j].id, toName:creditors[j].name, amount:pay});
    debtors[i].amt -= pay; creditors[j].amt -= pay;
    if(debtors[i].amt < 0.01) i++;
    if(creditors[j].amt < 0.01) j++;
  }
  return txns;
}

/* ---------------- equal split rounding ---------------- */
function equalSplit(amount, ids){
  const n = ids.length;
  const base = Math.floor((amount/n)*100)/100;
  let remainder = Math.round((amount - base*n)*100);
  const result = {};
  ids.forEach((id,idx)=>{
    result[id] = base + (idx < remainder ? 0.01 : 0);
  });
  return result;
}

/* ================= RENDER ================= */
function render(){
  const app = document.getElementById('app');
  const balances = computeBalances();
  const totalSpent = state.expenses.reduce((s,e)=>s+e.amount,0);
  const perHead = state.participants.length ? totalSpent/state.participants.length : 0;
  const txns = simplifyDebts(balances);

  app.innerHTML = `
    ${renderHero(totalSpent, perHead)}
    <div class="grid">
      <div>
        ${renderAddExpenseCard()}
        ${renderExpenseList()}
      </div>
      <div>
        ${renderBalances(balances)}
        ${renderSettlement(txns)}
      </div>
    </div>
    <div class="foot-actions">
      <button class="btn btn-ghost" onclick="exportSummary()">⬇ Export summary (.txt)</button>
      <button class="btn btn-ghost" onclick="confirmReset()">Reset trip</button>
    </div>
  `;
  attachHeroHandlers();
  attachFormHandlers();
}

function renderHero(totalSpent, perHead){
  const friendChips = state.participants.map(p=>`
    <div class="chip">
      <div class="avatar" style="background:${colorFor(p.id)}">${initials(p.name)}</div>
      <span>${escapeHtml(p.name)}</span>
      <button class="remove" title="Remove ${escapeHtml(p.name)}" onclick="removeParticipant('${p.id}')">×</button>
    </div>
  `).join('');

  return `
  <div class="pass">
    <div class="pass-main">
      <div class="eyebrow">Trip Ledger</div>
      <input class="trip-name-input" id="tripNameInput" value="${escapeAttr(state.tripName)}" placeholder="Name this trip">
      <div class="pass-meta">
        <div class="meta-field">
          <label>Date</label>
          <input type="date" id="tripDateInput" value="${state.date}">
        </div>
        <div class="meta-field">
          <label>Currency</label>
          <select id="currencyInput">
            ${['₹','$','€','£'].map(c=>`<option value="${c}" ${state.currency===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="meta-field">
          <label>Travelers</label>
          <div style="font-size:13.5px; padding-top:4px; font-weight:600;">${state.participants.length}</div>
        </div>
      </div>
      <div class="friends-row" style="padding-left:0; padding-right:0; border-top:none; padding-bottom:0;">
        ${friendChips}
        <button class="add-friend" id="addFriendBtn" onclick="showAddFriendForm()">+ Add friend</button>
      </div>
    </div>
    <div class="pass-stub">
      <div class="stub-item">
        <div class="stub-label">Total spent</div>
        <div class="stub-value">${fmt(totalSpent)}</div>
      </div>
      <div class="stub-item">
        <div class="stub-label">Per head (${state.participants.length || 0})</div>
        <div class="stub-value">${fmt(perHead)}</div>
      </div>
      <div class="stub-item">
        <div class="stub-label">Expenses logged</div>
        <div class="stub-value">${state.expenses.length}</div>
      </div>
    </div>
  </div>`;
}

function showAddFriendForm(){
  const btn = document.getElementById('addFriendBtn');
  btn.outerHTML = `
    <form class="add-friend-form" id="addFriendForm">
      <input type="text" id="newFriendName" placeholder="Friend's name" autofocus maxlength="24">
      <button type="submit">Add</button>
    </form>`;
  document.getElementById('addFriendForm').addEventListener('submit', e=>{
    e.preventDefault();
    const input = document.getElementById('newFriendName');
    const name = input.value.trim();
    if(!name) return;
    if(state.participants.some(p=>p.name.toLowerCase()===name.toLowerCase())){
      showToast('Someone with that name is already on the trip'); return;
    }
    const newP = {id:uid('p'), name};
    state.participants.push(newP);
    if(formDraft && !formDraft.editingId){
      formDraft.included.push(newP.id);
    }
    queueSave();
    render();
  });
  document.getElementById('newFriendName').focus();
}

function removeParticipant(id){
  const involved = state.expenses.some(e=>e.paidBy===id || e.splits[id]!==undefined);
  if(involved){
    openConfirm('Remove this friend?', 'They\u2019re part of one or more expenses. Removing them will also remove their share from those expenses.', ()=>{
      state.expenses.forEach(e=>{ delete e.splits[id]; });
      state.expenses = state.expenses.filter(e=> e.paidBy !== id );
      state.participants = state.participants.filter(p=>p.id!==id);
      queueSave(); render();
      showToast('Friend removed');
    });
  } else {
    state.participants = state.participants.filter(p=>p.id!==id);
    queueSave(); render();
  }
}

function attachHeroHandlers(){
  const nameInput = document.getElementById('tripNameInput');
  nameInput.addEventListener('change', ()=>{ state.tripName = nameInput.value.trim() || 'Weekend Getaway'; queueSave(); });
  const dateInput = document.getElementById('tripDateInput');
  dateInput.addEventListener('change', ()=>{ state.date = dateInput.value; queueSave(); });
  const currencyInput = document.getElementById('currencyInput');
  currencyInput.addEventListener('change', ()=>{ state.currency = currencyInput.value; queueSave(); render(); });
}

/* ---------------- add expense form ---------------- */
let formDraft = null; // holds transient form state while editing

function newDraft(existing){
  if(existing){
    return {
      editingId: existing.id,
      desc: existing.desc,
      amount: existing.amount,
      paidBy: existing.paidBy,
      category: existing.category,
      splitType: existing.splitType,
      included: Object.keys(existing.splits),
      customValues: existing.splitType === 'equal' ? {} : {...existing.rawInputs || existing.splits}
    };
  }
  return {
    editingId: null,
    desc: '', amount: '', paidBy: state.participants[0]?.id || '',
    category: 'food', splitType: 'equal',
    included: state.participants.map(p=>p.id),
    customValues: {}
  };
}

function renderAddExpenseCard(){
  if(!state.participants.length){
    return `<div class="card">
      <div class="card-head"><h2>Log an expense</h2></div>
      <div class="empty-state"><div class="big">🧳</div>Add at least one friend above before logging expenses.</div>
    </div>`;
  }
  if(!formDraft) formDraft = newDraft();
  const d = formDraft;

  const catButtons = CATEGORIES.map(c=>`
    <button type="button" class="cat-btn ${d.category===c.id?'active':''}" data-cat="${c.id}">${c.icon} ${c.label}</button>
  `).join('');

  const splitRows = state.participants.map(p=>{
    const checked = d.included.includes(p.id);
    let valueField = '';
    if(d.splitType !== 'equal'){
      const val = d.customValues[p.id] ?? '';
      valueField = `<input type="number" step="0.01" min="0" class="share-input" data-share="${p.id}" placeholder="${d.splitType==='percent'?'%':'amount'}" value="${val}" ${checked?'':'disabled'}>`;
    }
    return `
      <div class="split-row">
        <input type="checkbox" data-participant="${p.id}" ${checked?'checked':''}>
        <div class="avatar" style="background:${colorFor(p.id)}; width:20px; height:20px; font-size:9.5px;">${initials(p.name)}</div>
        <span class="name">${escapeHtml(p.name)}</span>
        ${valueField}
      </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-head">
      <h2>${d.editingId ? 'Edit expense' : 'Log an expense'}</h2>
      ${d.editingId ? `<button class="btn btn-ghost btn-small" onclick="cancelEdit()">Cancel edit</button>` : ''}
    </div>
    <form id="expenseForm">
      <div class="form-row">
        <label>What was it for?</label>
        <input type="text" id="descInput" placeholder="e.g. Lunch at the highway dhaba" value="${escapeAttr(d.desc)}" required maxlength="60">
      </div>
      <div class="two-col">
        <div class="form-row">
          <label>Amount</label>
          <input type="number" id="amountInput" step="0.01" min="0.01" placeholder="0.00" value="${d.amount}" required>
        </div>
        <div class="form-row">
          <label>Paid by</label>
          <select id="paidByInput">
            ${state.participants.map(p=>`<option value="${p.id}" ${d.paidBy===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Category</label>
        <div class="category-picker" id="categoryPicker">${catButtons}</div>
      </div>
      <div class="form-row">
        <label>Split</label>
        <div class="split-type-picker" id="splitTypePicker">
          <button type="button" data-type="equal" class="${d.splitType==='equal'?'active':''}">Equally</button>
          <button type="button" data-type="exact" class="${d.splitType==='exact'?'active':''}">Exact amounts</button>
          <button type="button" data-type="percent" class="${d.splitType==='percent'?'active':''}">Percentages</button>
        </div>
        <div class="split-participants" id="splitParticipants">${splitRows}</div>
        <div class="split-sum-note" id="splitSumNote"></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">${d.editingId ? 'Save changes' : '+ Add expense'}</button>
      </div>
    </form>
  </div>`;
}

function cancelEdit(){ formDraft = null; render(); }

function attachFormHandlers(){
  const form = document.getElementById('expenseForm');
  if(!form) return;
  const d = formDraft;

  document.getElementById('descInput').addEventListener('input', e=>{ d.desc = e.target.value; });
  document.getElementById('amountInput').addEventListener('input', e=>{ d.amount = e.target.value; updateSplitNote(); });
  document.getElementById('paidByInput').addEventListener('change', e=>{ d.paidBy = e.target.value; });

  document.getElementById('categoryPicker').addEventListener('click', e=>{
    const btn = e.target.closest('.cat-btn'); if(!btn) return;
    d.category = btn.dataset.cat;
    [...document.querySelectorAll('.cat-btn')].forEach(b=>b.classList.toggle('active', b===btn));
  });

  document.getElementById('splitTypePicker').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    d.splitType = btn.dataset.type;
    d.customValues = {};
    render();
  });

  document.getElementById('splitParticipants').addEventListener('change', e=>{
    if(e.target.matches('input[type=checkbox]')){
      const pid = e.target.dataset.participant;
      if(e.target.checked){ if(!d.included.includes(pid)) d.included.push(pid); }
      else { d.included = d.included.filter(x=>x!==pid); delete d.customValues[pid]; }
      render();
    }
    if(e.target.matches('.share-input')){
      const pid = e.target.dataset.share;
      d.customValues[pid] = e.target.value;
      updateSplitNote();
    }
  });
  document.getElementById('splitParticipants').addEventListener('input', e=>{
    if(e.target.matches('.share-input')){
      const pid = e.target.dataset.share;
      d.customValues[pid] = e.target.value;
      updateSplitNote();
    }
  });

  form.addEventListener('submit', e=>{
    e.preventDefault();
    submitExpense();
  });

  updateSplitNote();
}

function updateSplitNote(){
  const note = document.getElementById('splitSumNote');
  if(!note) return;
  const d = formDraft;
  const amount = parseFloat(d.amount) || 0;
  if(d.splitType === 'equal'){
    note.classList.remove('error');
    note.textContent = d.included.length ? `Split equally across ${d.included.length} ${d.included.length===1?'person':'people'} — ${fmt(amount/(d.included.length||1))} each.` : 'Select at least one person to split with.';
    return;
  }
  const sum = d.included.reduce((s,pid)=> s + (parseFloat(d.customValues[pid])||0), 0);
  if(d.splitType === 'exact'){
    const diff = Math.round((amount - sum)*100)/100;
    if(Math.abs(diff) < 0.01){ note.classList.remove('error'); note.textContent = `Shares add up to ${fmt(sum)}. ✓`; }
    else { note.classList.add('error'); note.textContent = diff > 0 ? `${fmt(diff)} left to assign.` : `Shares exceed the total by ${fmt(-diff)}.`; }
  } else {
    const diff = Math.round((100 - sum)*100)/100;
    if(Math.abs(diff) < 0.01){ note.classList.remove('error'); note.textContent = `Percentages add up to 100%. ✓`; }
    else { note.classList.add('error'); note.textContent = diff > 0 ? `${diff}% left to assign.` : `Percentages exceed 100% by ${-diff}%.`; }
  }
}

function submitExpense(){
  const d = formDraft;
  const amount = parseFloat(d.amount);
  if(!d.desc.trim() || !amount || amount <= 0){ showToast('Add a description and a valid amount'); return; }
  if(!d.included.length){ showToast('Select at least one person in the split'); return; }

  let splits = {}; let rawInputs = {};
  if(d.splitType === 'equal'){
    splits = equalSplit(amount, d.included);
  } else if(d.splitType === 'exact'){
    const sum = d.included.reduce((s,pid)=> s + (parseFloat(d.customValues[pid])||0), 0);
    if(Math.abs(sum - amount) > 0.01){ showToast('Exact amounts must add up to the total'); return; }
    d.included.forEach(pid=>{ splits[pid] = parseFloat(d.customValues[pid])||0; rawInputs[pid]=d.customValues[pid]; });
  } else {
    const sum = d.included.reduce((s,pid)=> s + (parseFloat(d.customValues[pid])||0), 0);
    if(Math.abs(sum - 100) > 0.01){ showToast('Percentages must add up to 100%'); return; }
    d.included.forEach(pid=>{ splits[pid] = Math.round(amount * (parseFloat(d.customValues[pid])||0)/100 * 100)/100; rawInputs[pid]=d.customValues[pid]; });
  }

  if(d.editingId){
    const exp = state.expenses.find(e=>e.id===d.editingId);
    Object.assign(exp, {desc:d.desc.trim(), amount, paidBy:d.paidBy, category:d.category, splitType:d.splitType, splits, rawInputs});
    showToast('Expense updated');
  } else {
    state.expenses.push({
      id: uid('e'), desc: d.desc.trim(), amount, paidBy: d.paidBy,
      category: d.category, splitType: d.splitType, splits, rawInputs,
      date: state.date, createdAt: Date.now()
    });
    showToast('Expense added');
  }
  formDraft = null;
  queueSave();
  render();
}

/* ---------------- expense list ---------------- */
function renderExpenseList(){
  if(!state.expenses.length){
    return `<div class="card">
      <div class="card-head"><h2>Expenses</h2></div>
      <div class="empty-state"><div class="big">🧾</div>No expenses yet — the first ticket stub shows up here.</div>
    </div>`;
  }
  const sorted = [...state.expenses].sort((a,b)=> b.createdAt - a.createdAt);
  const rows = sorted.map(e=>{
    const cat = CATEGORIES.find(c=>c.id===e.category) || CATEGORIES[CATEGORIES.length-1];
    const payer = state.participants.find(p=>p.id===e.paidBy);
    const splitText = Object.entries(e.splits).map(([pid,amt])=>{
      const p = state.participants.find(x=>x.id===pid);
      return p ? `${escapeHtml(p.name)} ${fmt(amt)}` : null;
    }).filter(Boolean).join(' · ');
    return `
      <div class="ticket">
        <div class="ticket-cat">${cat.icon}</div>
        <div class="ticket-body">
          <div class="ticket-top">
            <span class="ticket-desc">${escapeHtml(e.desc)}</span>
            <span class="ticket-amount">${fmt(e.amount)}</span>
          </div>
          <div class="ticket-meta">Paid by ${payer ? escapeHtml(payer.name) : 'someone removed'} · ${cat.label}</div>
          <div class="ticket-split">Split: ${splitText}</div>
        </div>
        <div class="ticket-actions">
          <button class="icon-btn" title="Edit" onclick="editExpense('${e.id}')">✎</button>
          <button class="icon-btn" title="Delete" onclick="confirmDeleteExpense('${e.id}')">🗑</button>
        </div>
      </div>`;
  }).join('');
  return `<div class="card">
    <div class="card-head"><h2>Expenses <span style="color:var(--ink-soft); font-weight:400; font-size:14px;">(${state.expenses.length})</span></h2></div>
    ${rows}
  </div>`;
}

function editExpense(id){
  const exp = state.expenses.find(e=>e.id===id);
  if(!exp) return;
  formDraft = newDraft(exp);
  render();
  document.querySelector('.card')?.scrollIntoView({behavior:'smooth', block:'start'});
}

function confirmDeleteExpense(id){
  const exp = state.expenses.find(e=>e.id===id);
  openConfirm('Delete this expense?', `"${exp.desc}" for ${fmt(exp.amount)} will be removed from the ledger.`, ()=>{
    state.expenses = state.expenses.filter(e=>e.id!==id);
    if(formDraft && formDraft.editingId === id) formDraft = null;
    queueSave(); render();
    showToast('Expense deleted');
  });
}

/* ---------------- balances panel ---------------- */
function renderBalances(balances){
  if(!state.participants.length) return '';
  const maxAbs = Math.max(1, ...balances.map(b=>Math.abs(b.net)));
  const rows = balances.map(b=>{
    const pct = Math.min(100, (Math.abs(b.net)/maxAbs)*100);
    const cls = b.net >= 0 ? 'pos' : 'neg';
    return `
      <div class="balance-row">
        <div class="b-top">
          <div class="b-name"><div class="avatar" style="background:${colorFor(b.id)}; width:20px;height:20px;font-size:9.5px;">${initials(b.name)}</div>${escapeHtml(b.name)}</div>
          <div class="b-amount ${cls}">${b.net>=0? 'gets back ' : 'owes '}${fmt(Math.abs(b.net))}</div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${b.net>=0?'var(--pine)':'var(--brick)'}"></div></div>
      </div>`;
  }).join('');
  return `<div class="card">
    <div class="card-head"><h2>Balances</h2></div>
    ${rows}
  </div>`;
}

/* ---------------- settlement panel ---------------- */
function renderSettlement(txns){
  if(!state.participants.length) return '';
  if(!txns.length){
    return `<div class="card"><div class="card-head"><h2>Settle up</h2></div><div class="all-settled">✓ Everyone's square</div></div>`;
  }
  const rows = txns.map(t=>{
    const key = t.from+'|'+t.to;
    const settled = !!state.settledPairs[key];
    return `
      <div class="settle-ticket ${settled?'settled':''}">
        <div class="settle-text">
          <b>${escapeHtml(t.fromName)}</b> <span class="settle-arrow">→</span> <b>${escapeHtml(t.toName)}</b>
          <div class="mono" style="margin-top:2px; font-size:14px;">${fmt(t.amount)}</div>
        </div>
        <label class="settle-check">
          <input type="checkbox" ${settled?'checked':''} onchange="toggleSettled('${key}')">
          Settled
        </label>
      </div>`;
  }).join('');
  return `<div class="card">
    <div class="card-head"><h2>Settle up</h2></div>
    <div style="font-size:12.5px; color:var(--ink-soft); margin-bottom:12px;">The fewest transfers needed to even everything out.</div>
    ${rows}
  </div>`;
}

function toggleSettled(key){
  state.settledPairs[key] = !state.settledPairs[key];
  queueSave(); render();
}

/* ---------------- reset / export ---------------- */
function confirmReset(){
  openConfirm('Reset this trip?', 'This clears all friends, expenses, and settlements. This cannot be undone.', ()=>{
    state = defaultState();
    formDraft = null;
    queueSave(); render();
    showToast('Trip reset');
  });
}

function exportSummary(){
  const balances = computeBalances();
  const txns = simplifyDebts(balances);
  const total = state.expenses.reduce((s,e)=>s+e.amount,0);
  let lines = [];
  lines.push(`${state.tripName}`);
  lines.push(`Date: ${state.date}`);
  lines.push(`Travelers: ${state.participants.map(p=>p.name).join(', ')}`);
  lines.push('');
  lines.push(`TOTAL SPENT: ${fmt(total)}`);
  lines.push('');
  lines.push('EXPENSES');
  [...state.expenses].sort((a,b)=>a.createdAt-b.createdAt).forEach(e=>{
    const payer = state.participants.find(p=>p.id===e.paidBy);
    lines.push(`- ${e.desc}: ${fmt(e.amount)} (paid by ${payer?payer.name:'—'})`);
  });
  lines.push('');
  lines.push('BALANCES');
  balances.forEach(b=>{
    lines.push(`- ${b.name}: ${b.net>=0?'gets back':'owes'} ${fmt(Math.abs(b.net))}`);
  });
  lines.push('');
  lines.push('SETTLE UP');
  if(!txns.length) lines.push('Everyone is square.');
  txns.forEach(t=> lines.push(`- ${t.fromName} pays ${t.toName} ${fmt(t.amount)}`));

  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${state.tripName.replace(/[^a-z0-9]+/gi,'_')}_summary.txt`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Summary downloaded');
}

/* ---------------- utils ---------------- */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

/* ---------------- boot ---------------- */
loadState();
</script>
